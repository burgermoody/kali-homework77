{% extends "base.html" %}

{% block title %}个人中心 - 用户管理系统{% endblock %}

{% block content %}
<div class="card profile-card">
    <h2>个人中心</h2>

    <div class="user-info">
        <h3>用户资料</h3>
        <table class="info-table">
            <tr>
                <td class="info-label">ID</td>
                <td class="info-value">{{ user.id }}</td>
            </tr>
            <tr>
                <td class="info-label">用户名</td>
                <td class="info-value">{{ user.username }}</td>
            </tr>
            <tr>
                <td class="info-label">邮箱</td>
                <td class="info-value">{{ user.email }}</td>
            </tr>
            <tr>
                <td class="info-label">手机</td>
                <td class="info-value">{{ user.phone }}</td>
            </tr>
            <tr>
                <td class="info-label">角色</td>
                <td class="info-value">{{ user.role }}</td>
            </tr>
            <tr>
                <td class="info-label">余额</td>
                <td class="info-value">¥{{ "%.2f"|format(user.balance) }}</td>
            </tr>
        </table>
    </div>

    <div class="recharge-section">
        <h3>充值</h3>
        <form method="post" action="/recharge" class="recharge-form">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="user_id" value="{{ user.id }}">

            <div class="form-group">
                <label for="amount">充值金额</label>
                <input type="text" id="amount" name="amount" placeholder="请输入金额（支持正数和负数）" class="recharge-input">
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-primary">充 值</button>
            </div>
        </form>
    </div>

    <div class="change-password-section">
        <h3>修改密码</h3>
        <form method="post" action="/change-password" class="change-password-form">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="username" value="{{ user.username }}">
            <input type="hidden" name="user_id" value="{{ user.id }}">

            <div class="form-group">
                <label for="new_password">新密码</label>
                <input type="password" id="new_password" name="new_password" placeholder="请输入新密码" class="change-password-input" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">确认密码</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="请再次输入新密码" class="change-password-input" required>
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-primary">修改密码</button>
            </div>
        </form>
    </div>

    <div class="action-row">
        <a href="/" class="btn btn-primary" style="width:auto;padding:10px 36px;">返回首页</a>
    </div>
</div>
{% endblock %}
