{% extends "base.html" %}

{% block title %}注册 - 用户管理系统{% endblock %}

{% block content %}
<div class="card login-card">
    <h2>用户注册</h2>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/register" class="login-form">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="请输入用户名" maxlength="64" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码" maxlength="128" required>
        </div>
        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" placeholder="请输入邮箱" maxlength="128">
        </div>
        <div class="form-group">
            <label for="phone">手机号</label>
            <input type="text" id="phone" name="phone" placeholder="请输入手机号" maxlength="20">
        </div>
        <div class="form-group">
            <button type="submit" class="btn btn-primary">注 册</button>
        </div>
    </form>
</div>
{% endblock %}
