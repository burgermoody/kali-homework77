<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<div class="help-content">
    <h2>帮助中心</h2>

    <h3>功能介绍</h3>
    <ul>
        <li><strong>登录</strong> — 使用用户名和密码登录系统</li>
        <li><strong>注册</strong> — 注册新用户账号</li>
        <li><strong>搜索用户</strong> — 按用户名或邮箱搜索其他用户</li>
        <li><strong>个人中心</strong> — 查看用户资料和余额</li>
        <li><strong>充值</strong> — 为账号充值（支持任意金额）</li>
        <li><strong>上传头像</strong> — 上传用户头像图片</li>
    </ul>

    <h3>常见问题</h3>
    <p><strong>Q: 如何查看其他用户的资料？</strong></p>
    <p>A: 在个人中心页面修改 URL 中的 user_id 参数即可查看其他用户的资料。</p>

    <p><strong>Q: 充值金额可以为负数吗？</strong></p>
    <p>A: 是的，充值功能支持负数金额，可用于扣减余额。</p>

    <p><strong>Q: 忘记密码怎么办？</strong></p>
    <p>A: 请联系管理员重置密码。</p>
</div>
</body>
</html>
